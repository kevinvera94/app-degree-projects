services:
  - type: web
    name: usc-degree-projects-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
      - key: JUROR_EXPIRY_ALERT_DAYS
        value: "3"
      - key: JUROR_EVALUATION_DEADLINE_DAYS
        value: "15"
      - key: JUROR_SECOND_REVIEW_DEADLINE_DAYS
        value: "10"
      - key: STUDENT_CORRECTION_DEADLINE_DAYS
        value: "10"
